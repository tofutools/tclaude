version: 2

before:
  hooks:
    - go mod tidy

builds:
  # Linux/Windows: pure Go, no cgo. fyne.io/systray uses D-Bus
  # (StatusNotifierItem) on Linux and syscall on Windows, so the
  # tray icon works without a C toolchain.
  - id: tclaude-no-cgo
    main: .
    binary: tclaude
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
  # macOS: fyne.io/systray binds Cocoa via cgo, so darwin builds
  # need CGO_ENABLED=1. CI runs darwin builds on a macos-latest
  # runner where xcrun's clang is available, so the native build
  # links cleanly. amd64 is intentionally skipped (Apple Silicon
  # only).
  - id: tclaude-darwin
    main: .
    binary: tclaude
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - arm64

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
