<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>tclaude agent dashboard</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  font-size: 14px;
  background: #0f1419;
  color: #d4d4d4;
}
header {
  padding: 16px 24px 12px;
  border-bottom: 1px solid #2a3340;
  background: #161b22;
  display: flex;
  align-items: center;
  gap: 16px;
}
header h1 { margin: 0; font-size: 18px; font-weight: 600; }
header .meta { color: #7d8590; font-size: 12px; }
nav { display: flex; gap: 4px; padding: 0 24px; background: #161b22; border-bottom: 1px solid #2a3340; }
nav button {
  background: none; border: none; color: #7d8590; padding: 10px 16px;
  cursor: pointer; font-size: 14px; border-bottom: 2px solid transparent;
}
nav button.active { color: #d4d4d4; border-bottom-color: #58a6ff; }
nav button:hover { color: #d4d4d4; }
main { padding: 16px 24px; }
section { display: none; }
section.active { display: block; }
table { border-collapse: collapse; width: 100%; }
table th, table td {
  text-align: left; padding: 8px 12px; border-bottom: 1px solid #2a3340;
  vertical-align: top;
}
table th { color: #7d8590; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
table tr:hover { background: #161b22; }
.online { color: #3fb950; }
.offline { color: #484f58; }
.state-pill {
  display: inline-block; padding: 1px 8px; font-size: 11px;
  border-radius: 10px; font-family: ui-monospace, monospace; white-space: nowrap;
  border: 1px solid transparent;
}
.state-working   { background: #0a3622; color: #3fb950; border-color: #1d4d2c; }
.state-idle      { background: #36280a; color: #d29922; border-color: #4d3a1d; }
.state-awaiting  { background: #3a1010; color: #ff7b72; border-color: #4d1d1d; }
.state-exited    { background: #21262d; color: #7d8590; border-color: #2a3340; }
.state-offline   { background: #161b22; color: #484f58; border-color: #2a3340; }
.state-detail { color: #7d8590; font-size: 11px; margin-left: 6px; }
.cwd {
  display: inline-block; max-width: 280px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap; vertical-align: bottom;
  font-family: ui-monospace, monospace; font-size: 11px; color: #7d8590;
}
.last-hook { color: #7d8590; font-size: 11px; }
.id { font-family: ui-monospace, "JetBrains Mono", "Fira Code", monospace; font-size: 12px; color: #7d8590; }
.alias { font-weight: 600; }
.title { color: #d4d4d4; }
.slug { font-family: ui-monospace, monospace; font-size: 12px; }
.muted { color: #7d8590; }
details { margin: 4px 0; }
details > summary {
  cursor: pointer; padding: 6px 0; list-style: none;
}
details > summary::-webkit-details-marker { display: none; }
details > summary::before { content: "▶ "; color: #7d8590; font-size: 10px; }
details[open] > summary::before { content: "▼ "; }
.subtable { margin: 4px 0 12px 24px; border-left: 2px solid #2a3340; padding-left: 12px; }
.tag {
  display: inline-block; padding: 2px 8px; margin: 1px 2px 1px 0;
  background: #21262d; color: #d4d4d4; border: 1px solid #2a3340;
  border-radius: 12px; font-size: 11px; font-family: ui-monospace, monospace;
}
.tag.default { border-color: #1f6feb; color: #58a6ff; }
.owner-badge {
  display: inline-block; padding: 1px 6px; margin-left: 4px;
  background: #1d2a3a; color: #d29922; border: 1px solid #4d3a1d;
  border-radius: 10px; font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.copy-cmd {
  display: block; margin-top: 8px;
  background: #0d1117; border: 1px solid #2a3340; border-radius: 4px;
  padding: 8px 12px; font-family: ui-monospace, monospace; font-size: 12px;
  color: #c9d1d9; cursor: pointer;
  white-space: nowrap; overflow-x: auto;
}
.copy-cmd:hover { border-color: #58a6ff; }
.copy-cmd::before { content: "$ "; color: #7d8590; }
#status { font-size: 11px; color: #7d8590; }
#status.error { color: #f85149; }
.empty { color: #7d8590; font-style: italic; padding: 24px; text-align: center; }
.banner {
  background: #1c2128; border: 1px solid #2a3340; border-left: 3px solid #d29922;
  padding: 8px 12px; margin: 0 24px; border-radius: 0 0 4px 4px;
  color: #d29922; font-size: 12px;
}
</style>
</head>
<body>
<header>
  <h1>🤝 tclaude agent dashboard</h1>
  <span class="meta" id="meta">loading…</span>
  <span class="meta" style="margin-left:auto" id="status"></span>
</header>
<div class="banner">
  Read-only view. Use the <code>tclaude agent</code> CLI for changes — every row has a "Copy CLI command" suggestion. <a href="#" id="refresh-link" style="color:#58a6ff">refresh now</a>
</div>
<nav>
  <button class="active" data-tab="groups">Groups</button>
  <button data-tab="agents">Agents</button>
  <button data-tab="permissions">Permissions</button>
  <button data-tab="slugs">Slug registry</button>
</nav>
<main>
  <section id="tab-groups" class="active"></section>
  <section id="tab-agents"></section>
  <section id="tab-permissions"></section>
  <section id="tab-slugs"></section>
</main>
<script>
(function() {
  const $ = (sel, root) => (root || document).querySelector(sel);
  const $$ = (sel, root) => Array.from((root || document).querySelectorAll(sel));
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function shortId(id) { return (id || '').slice(0, 8); }
  function onlineDot(online) {
    return online
      ? '<span class="online" title="online">●</span>'
      : '<span class="offline" title="offline">○</span>';
  }

  // statusPillClass mirrors session/list.go's getStatusColorFunc so
  // the dashboard's pill colors match the terminal `session ls` output.
  function statusPillClass(status) {
    if (!status) return 'state-offline';
    if (status === 'working') return 'state-working';
    if (status === 'main_agent_idle') return 'state-working';
    if (status === 'idle') return 'state-idle';
    if (status === 'awaiting_permission' || status === 'awaiting_input') return 'state-awaiting';
    if (status === 'exited') return 'state-exited';
    return 'state-idle';
  }

  // statePill renders a colored pill for an agent's state. Combines
  // status + status_detail when present (e.g. "working: Bash"). For
  // offline (no status row) we render a literal "offline" pill so
  // every row has a consistent shape.
  function statePill(state, online) {
    const s = (state && state.status) || '';
    const detail = (state && state.status_detail) || '';
    let label = s || (online ? 'online' : 'offline');
    if (s && detail) label = `${s}: ${detail}`;
    const cls = online ? statusPillClass(s) : 'state-offline';
    return `<span class="state-pill ${cls}" title="${esc(label)}">${esc(label)}</span>`;
  }

  // groupTagsCell renders the Groups column on the Agents view. Each
  // group becomes a tag; groups the agent owns get an "owner" badge
  // appended to the tag so the manager-vs-member distinction is
  // visible at a glance.
  function groupTagsCell(a) {
    const groups = a.groups || [];
    if (!groups.length) return '<span class="muted">(none)</span>';
    const owned = new Set(a.owned_groups || []);
    return groups.map(g => {
      const ownBadge = owned.has(g) ? '<span class="owner-badge">owner</span>' : '';
      return `<span class="tag">${esc(g)}${ownBadge}</span>`;
    }).join(' ');
  }

  // roleCell renders the role column for a member row. Mirrors the CLI:
  // members who are also owners get an "owner" badge; pure-owners
  // (role==="owner" set by the daemon) show the badge alone.
  function roleCell(m) {
    if (m.owner) {
      if (!m.role || m.role === 'owner') {
        return '<span class="owner-badge">owner</span>';
      }
      return `${esc(m.role)} <span class="owner-badge">owner</span>`;
    }
    return esc(m.role || '');
  }

  // relTime renders an ISO timestamp as a coarse "Ns/m/h ago" string.
  // Mirrors the session ls UPDATED column. Empty input → "" (no chip).
  function relTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d)) return '';
    const sec = Math.max(0, Math.floor((Date.now() - d.getTime()) / 1000));
    if (sec < 60) return sec + 's ago';
    if (sec < 3600) return Math.floor(sec / 60) + 'm ago';
    if (sec < 86400) return Math.floor(sec / 3600) + 'h ago';
    return Math.floor(sec / 86400) + 'd ago';
  }

  function shortCwd(cwd) {
    if (!cwd) return '';
    const home = (cwd.match(/^\/(?:home|Users)\/[^/]+/) || [''])[0];
    if (home && cwd.startsWith(home)) return '~' + cwd.slice(home.length);
    return cwd;
  }

  function renderGroups(groups) {
    if (!groups || !groups.length) {
      return '<div class="empty">No groups yet. Create one with: <code>tclaude agent groups create &lt;name&gt;</code></div>';
    }
    return groups.map(g => {
      const members = g.members || [];
      // Restore expanded state across the 5s polling re-renders by
      // keying on group name. Persisted in localStorage so it
      // survives a full page reload too.
      const isOpen = localStorage.getItem('tclaude.dash.group.' + g.name) === '1';
      return `
      <details data-group-key="${esc(g.name)}"${isOpen ? ' open' : ''}>
        <summary>
          <strong>${esc(g.name)}</strong>
          <span class="muted">— ${members.length} members, ${g.online || 0} online</span>
          ${g.descr ? `<span class="muted"> — ${esc(g.descr)}</span>` : ''}
        </summary>
        <div class="subtable">
          ${members.length === 0 ? '<div class="muted">(no members yet)</div>' : `
          <table>
            <thead>
              <tr>
                <th></th><th>ID</th><th>Alias / Title</th><th>State</th><th>Last</th><th>Role</th><th>Description</th>
              </tr>
            </thead>
            <tbody>
              ${members.map(m => {
                const state = m.state || {};
                const subagents = state.subagent_count || 0;
                return `
                <tr>
                  <td>${onlineDot(m.online)}</td>
                  <td class="id">${esc(shortId(m.conv_id))}</td>
                  <td>
                    <div class="alias">${esc(m.alias || m.title || '(unnamed)')}</div>
                    ${m.alias && m.title ? `<div class="title muted">${esc(m.title)}</div>` : ''}
                  </td>
                  <td>
                    ${statePill(state, m.online)}
                    ${subagents > 0 ? `<span class="state-detail">+${subagents}</span>` : ''}
                  </td>
                  <td><span class="last-hook">${esc(relTime(state.last_hook))}</span></td>
                  <td>${roleCell(m)}</td>
                  <td class="muted">${esc(m.descr || '')}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>`}
          <code class="copy-cmd" data-copy="tclaude agent groups members ${g.name}">tclaude agent groups members ${esc(g.name)}</code>
        </div>
      </details>
    `;
    }).join('');
  }

  function renderAgents(agents) {
    if (!agents || !agents.length) {
      return '<div class="empty">No agents in any group yet.</div>';
    }
    return `
      <table>
        <thead>
          <tr>
            <th></th><th>ID</th><th>Name</th><th>State</th><th>Last activity</th><th>CWD</th><th>Groups</th><th>Effective permissions</th>
          </tr>
        </thead>
        <tbody>
          ${agents.map(a => {
            const state = a.state || {};
            const lh = relTime(state.last_hook);
            const subagents = state.subagent_count || 0;
            return `
            <tr>
              <td>${onlineDot(a.online)}</td>
              <td class="id">${esc(shortId(a.conv_id))}</td>
              <td><span class="alias">${esc(a.title)}</span></td>
              <td>
                ${statePill(state, a.online)}
                ${subagents > 0 ? `<span class="state-detail">+${subagents} subagent${subagents > 1 ? 's' : ''}</span>` : ''}
              </td>
              <td><span class="last-hook">${esc(lh)}</span></td>
              <td><span class="cwd" title="${esc(state.cwd || '')}">${esc(shortCwd(state.cwd))}</span></td>
              <td>${groupTagsCell(a)}</td>
              <td>${(a.effective || []).map(s => `<span class="tag slug">${esc(s)}</span>`).join(' ') || '<span class="muted">(none)</span>'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    `;
  }

  function renderPermissions(perm, agents) {
    const titleByConv = Object.fromEntries((agents || []).map(a => [a.conv_id, a.title]));
    const grants = perm.grants || {};
    const defaults = perm.defaults || [];
    return `
      <h3 style="margin-top:0">Defaults <span class="muted" style="font-size:11px">— granted to every agent (config.json)</span></h3>
      ${defaults.length === 0
        ? '<div class="empty">No defaults set. Grant with: <code>tclaude agent permissions grant default &lt;slug&gt;</code></div>'
        : `<div>${defaults.map(s => `<span class="tag default slug">${esc(s)}</span>`).join(' ')}</div>`}
      <h3>Per-agent grants <span class="muted" style="font-size:11px">— additive on top of defaults (SQLite agent_permissions)</span></h3>
      ${Object.keys(grants).length === 0
        ? '<div class="empty">No per-agent grants yet. Grant with: <code>tclaude agent permissions grant &lt;conv&gt; &lt;slug&gt;</code></div>'
        : `<table>
            <thead><tr><th>ID</th><th>Title</th><th>Granted slugs</th></tr></thead>
            <tbody>
              ${Object.entries(grants).map(([k, slugs]) => `
                <tr>
                  <td class="id">${esc(shortId(k))}</td>
                  <td class="alias">${esc(titleByConv[k] || '(unknown)')}</td>
                  <td>${slugs.map(s => `<span class="tag slug">${esc(s)}</span>`).join(' ')}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>`}
    `;
  }

  function renderSlugs(slugs) {
    if (!slugs || !slugs.length) return '<div class="empty">No slugs registered.</div>';
    return `
      <table>
        <thead><tr><th>Slug</th><th>Description</th></tr></thead>
        <tbody>
          ${slugs.map(s => `
            <tr>
              <td><span class="slug">${esc(s.slug)}</span></td>
              <td>${esc(s.description || '')}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  function showStatus(text, isError) {
    const el = $('#status');
    el.textContent = text;
    el.classList.toggle('error', !!isError);
  }

  async function refresh() {
    try {
      const r = await fetch('/api/snapshot', { credentials: 'same-origin' });
      if (!r.ok) {
        showStatus('snapshot failed: HTTP ' + r.status, true);
        return;
      }
      const data = await r.json();
      $('#meta').textContent = data.popup_base + ' · refreshed ' + new Date(data.generated_at).toLocaleTimeString();
      $('#tab-groups').innerHTML = renderGroups(data.groups);
      $('#tab-agents').innerHTML = renderAgents(data.agents);
      $('#tab-permissions').innerHTML = renderPermissions(data.permissions, data.agents);
      $('#tab-slugs').innerHTML = renderSlugs(data.slugs);
      showStatus('● live', false);
    } catch (e) {
      showStatus('snapshot failed: ' + (e.message || e), true);
    }
  }

  function bindTabs() {
    $$('nav button').forEach(b => {
      b.addEventListener('click', () => {
        $$('nav button').forEach(x => x.classList.toggle('active', x === b));
        $$('main section').forEach(s => {
          s.classList.toggle('active', s.id === 'tab-' + b.dataset.tab);
        });
      });
    });
  }

  function bindCopy() {
    document.addEventListener('click', e => {
      const t = e.target.closest('[data-copy]');
      if (!t) return;
      const cmd = t.getAttribute('data-copy');
      navigator.clipboard?.writeText(cmd).then(() => {
        const orig = t.textContent;
        t.textContent = '✓ copied: ' + cmd;
        setTimeout(() => { t.textContent = orig; }, 1200);
      }).catch(() => {});
    });
  }

  // <details> only fires `toggle` on the element itself (not bubbling),
  // so use a capturing listener at the document level rather than
  // re-binding per-element after every render.
  function bindDetailsPersistence() {
    document.addEventListener('toggle', e => {
      const d = e.target;
      if (!(d instanceof HTMLDetailsElement)) return;
      const key = d.getAttribute('data-group-key');
      if (!key) return;
      if (d.open) {
        localStorage.setItem('tclaude.dash.group.' + key, '1');
      } else {
        localStorage.removeItem('tclaude.dash.group.' + key);
      }
    }, true);
  }

  $('#refresh-link').addEventListener('click', e => { e.preventDefault(); refresh(); });
  bindTabs();
  bindCopy();
  bindDetailsPersistence();
  refresh();
  setInterval(refresh, 5000);
})();
</script>
</body>
</html>
