<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>tclaude agent dashboard</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  font-size: 14px;
  background: #0f1419;
  color: #d4d4d4;
}
header {
  padding: 16px 24px 12px;
  border-bottom: 1px solid #2a3340;
  background: #161b22;
  display: flex;
  align-items: center;
  gap: 16px;
}
header h1 { margin: 0; font-size: 18px; font-weight: 600; }
header .meta { color: #7d8590; font-size: 12px; }
nav { display: flex; gap: 4px; padding: 0 24px; background: #161b22; border-bottom: 1px solid #2a3340; }
nav button {
  background: none; border: none; color: #7d8590; padding: 10px 16px;
  cursor: pointer; font-size: 14px; border-bottom: 2px solid transparent;
}
nav button.active { color: #d4d4d4; border-bottom-color: #58a6ff; }
nav button:hover { color: #d4d4d4; }
main { padding: 16px 24px; }
section { display: none; }
section.active { display: block; }
table { border-collapse: collapse; width: 100%; }
table th, table td {
  text-align: left; padding: 8px 12px; border-bottom: 1px solid #2a3340;
  vertical-align: top;
}
table th { color: #7d8590; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
table tr:hover { background: #161b22; }
.online { color: #3fb950; }
.offline { color: #484f58; }
.state-pill {
  display: inline-block; padding: 1px 8px; font-size: 11px;
  border-radius: 10px; font-family: ui-monospace, monospace; white-space: nowrap;
  border: 1px solid transparent;
}
.state-working   { background: #0a3622; color: #3fb950; border-color: #1d4d2c; }
.state-idle      { background: #36280a; color: #d29922; border-color: #4d3a1d; }
.state-awaiting  { background: #3a1010; color: #ff7b72; border-color: #4d1d1d; }
.state-exited    { background: #21262d; color: #7d8590; border-color: #2a3340; }
.state-offline   { background: #161b22; color: #484f58; border-color: #2a3340; }
.state-detail { color: #7d8590; font-size: 11px; margin-left: 6px; }
.cwd {
  display: inline-block; max-width: 280px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap; vertical-align: bottom;
  font-family: ui-monospace, monospace; font-size: 11px; color: #7d8590;
}
.last-hook { color: #7d8590; font-size: 11px; }
.id { font-family: ui-monospace, "JetBrains Mono", "Fira Code", monospace; font-size: 12px; color: #7d8590; }
.alias { font-weight: 600; }
.title { color: #d4d4d4; }
.slug { font-family: ui-monospace, monospace; font-size: 12px; }
.muted { color: #7d8590; }
details { margin: 4px 0; }
details > summary {
  cursor: pointer; padding: 6px 0; list-style: none;
}
details > summary::-webkit-details-marker { display: none; }
details > summary::before { content: "▶ "; color: #7d8590; font-size: 10px; }
details[open] > summary::before { content: "▼ "; }
.subtable { margin: 4px 0 12px 24px; border-left: 2px solid #2a3340; padding-left: 12px; }
.tag {
  display: inline-block; padding: 2px 8px; margin: 1px 2px 1px 0;
  background: #21262d; color: #d4d4d4; border: 1px solid #2a3340;
  border-radius: 12px; font-size: 11px; font-family: ui-monospace, monospace;
}
.tag.default { border-color: #1f6feb; color: #58a6ff; }
.owner-badge {
  display: inline-block; padding: 1px 6px; margin-left: 4px;
  background: #1d2a3a; color: #d29922; border: 1px solid #4d3a1d;
  border-radius: 10px; font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.copy-cmd {
  display: block; margin-top: 8px;
  background: #0d1117; border: 1px solid #2a3340; border-radius: 4px;
  padding: 8px 12px; font-family: ui-monospace, monospace; font-size: 12px;
  color: #c9d1d9; cursor: pointer;
  white-space: nowrap; overflow-x: auto;
}
.copy-cmd:hover { border-color: #58a6ff; }
.copy-cmd::before { content: "$ "; color: #7d8590; }
#status { font-size: 11px; color: #7d8590; }
#status.error { color: #f85149; }
.empty { color: #7d8590; font-style: italic; padding: 24px; text-align: center; }
.row-actions {
  display: inline-flex; gap: 4px; opacity: 0.4;
}
tr:hover .row-actions { opacity: 1; }
.row-actions button {
  background: #161b22; border: 1px solid #2a3340; border-radius: 4px;
  color: #7d8590; cursor: pointer; padding: 2px 8px; font-size: 11px;
  font-family: inherit;
}
.row-actions button:hover { color: #d4d4d4; border-color: #58a6ff; }
.row-actions button.danger:hover { color: #f85149; border-color: #f85149; }
.row-actions button.warn:hover { color: #d29922; border-color: #d29922; }
.group-actions {
  display: inline-flex; gap: 4px; margin-left: 8px;
  opacity: 0.4; transition: opacity 0.15s ease;
}
details > summary:hover .group-actions,
details[open] > summary .group-actions { opacity: 1; }
.group-actions button {
  background: #161b22; border: 1px solid #2a3340; border-radius: 4px;
  color: #7d8590; cursor: pointer; padding: 2px 8px; font-size: 11px;
  font-family: inherit;
}
.group-actions button:hover { color: #d4d4d4; border-color: #58a6ff; }
.group-actions button.danger:hover { color: #f85149; border-color: #f85149; }
.group-rename-input {
  background: #0d1117; border: 1px solid #58a6ff; border-radius: 3px;
  color: #d4d4d4; padding: 1px 6px; font: inherit; font-weight: bold;
  min-width: 8em;
}
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  display: none; align-items: center; justify-content: center; z-index: 100;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #161b22; border: 1px solid #2a3340; border-radius: 6px;
  padding: 20px 24px; max-width: 480px; width: calc(100% - 32px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
.modal h3 { margin: 0 0 8px; font-size: 16px; color: #d4d4d4; }
.modal p { margin: 8px 0; color: #c9d1d9; }
.modal .modal-meta {
  background: #0d1117; border: 1px solid #2a3340; border-radius: 4px;
  padding: 8px 12px; font-family: ui-monospace, monospace; font-size: 12px;
  color: #c9d1d9; margin: 8px 0;
}
.modal-buttons { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.modal-buttons button {
  background: #21262d; border: 1px solid #2a3340; border-radius: 4px;
  color: #c9d1d9; cursor: pointer; padding: 6px 14px; font-size: 14px;
  font-family: inherit;
}
.modal-buttons button.confirm-danger {
  background: #4d1d1d; border-color: #f85149; color: #f85149;
}
.modal-buttons button.confirm-danger:hover { background: #f85149; color: #fff; }
.modal-buttons button:hover { border-color: #58a6ff; }
.modal .field { display: flex; flex-direction: column; gap: 4px; margin: 10px 0; }
.modal .field label { font-size: 12px; color: #7d8590; }
.modal .field input,
.modal .field textarea {
  background: #0d1117; border: 1px solid #2a3340; border-radius: 3px;
  color: #d4d4d4; padding: 6px 8px; font-family: inherit; font-size: 13px;
}
.modal .field input:focus,
.modal .field textarea:focus { border-color: #58a6ff; outline: none; }
.modal .field textarea { resize: vertical; min-height: 60px; }
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: #161b22; border: 1px solid #2a3340; border-left: 3px solid #3fb950;
  border-radius: 4px; padding: 10px 14px; color: #c9d1d9;
  font-size: 13px; max-width: 360px; z-index: 200;
  opacity: 0; transform: translateY(8px); pointer-events: none;
  transition: opacity 0.18s ease, transform 0.18s ease;
}
.toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
.toast.error { border-left-color: #f85149; }
.filter-bar {
  display: flex; align-items: center; gap: 8px;
  margin: 0 0 12px 0;
}
.filter-bar input {
  flex: 1; max-width: 360px;
  background: #0d1117; border: 1px solid #2a3340; border-radius: 4px;
  padding: 6px 10px; font-size: 13px; color: #c9d1d9;
  font-family: inherit;
}
.filter-bar input:focus { outline: none; border-color: #58a6ff; }
.filter-bar .filter-count { font-size: 11px; color: #7d8590; }
.filter-bar button.clear-filter {
  background: transparent; border: none; color: #7d8590;
  cursor: pointer; padding: 4px 8px; font-size: 12px;
  font-family: inherit;
}
.filter-bar button.clear-filter:hover { color: #d4d4d4; }
</style>
</head>
<body>
<header>
  <h1>🤝 tclaude agent dashboard</h1>
  <span class="meta" id="meta">loading…</span>
  <span class="meta" style="margin-left:auto" id="status"></span>
</header>
<nav>
  <button class="active" data-tab="groups">Groups</button>
  <button data-tab="agents">Agents</button>
  <button data-tab="cron">Cron</button>
  <button data-tab="permissions">Permissions</button>
  <button data-tab="slugs">Slug registry</button>
</nav>
<main>
  <section id="tab-groups" class="active">
    <div class="filter-bar">
      <input id="filter-groups" type="text" placeholder="Filter groups (matches group name + member alias/title)" autocomplete="off" spellcheck="false" />
      <span class="filter-count" id="filter-groups-count"></span>
      <button class="clear-filter" id="filter-groups-clear" title="Clear filter">×</button>
    </div>
    <div id="groups-list"></div>
  </section>
  <section id="tab-agents">
    <div class="filter-bar">
      <input id="filter-agents" type="text" placeholder="Filter agents (matches title + conv-id + group tags)" autocomplete="off" spellcheck="false" />
      <span class="filter-count" id="filter-agents-count"></span>
      <button class="clear-filter" id="filter-agents-clear" title="Clear filter">×</button>
    </div>
    <div id="agents-list"></div>
  </section>
  <section id="tab-cron">
    <div class="filter-bar">
      <input id="filter-cron" type="text" placeholder="Filter cron jobs (matches name + owner/target label + body)" autocomplete="off" spellcheck="false" />
      <span class="filter-count" id="filter-cron-count"></span>
      <button class="clear-filter" id="filter-cron-clear" title="Clear filter">×</button>
    </div>
    <div id="cron-list"></div>
  </section>
  <section id="tab-permissions"></section>
  <section id="tab-slugs"></section>
</main>
<div class="modal-overlay" id="confirm-modal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
    <h3 id="confirm-title"></h3>
    <p id="confirm-body"></p>
    <div class="modal-meta" id="confirm-meta"></div>
    <div class="modal-buttons">
      <button id="confirm-cancel">Cancel</button>
      <button id="confirm-ok" class="confirm-danger"></button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="edit-member-modal">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="edit-member-title">
    <h3 id="edit-member-title">Edit member</h3>
    <div class="modal-meta" id="edit-member-meta"></div>
    <div class="field">
      <label for="edit-member-alias">Alias</label>
      <input id="edit-member-alias" type="text" autocomplete="off" spellcheck="false" />
    </div>
    <div class="field">
      <label for="edit-member-role">Role</label>
      <input id="edit-member-role" type="text" autocomplete="off" spellcheck="false" />
    </div>
    <div class="field">
      <label for="edit-member-descr">Description</label>
      <textarea id="edit-member-descr" rows="3" spellcheck="false"></textarea>
    </div>
    <div class="modal-buttons">
      <button id="edit-member-cancel">Cancel</button>
      <button id="edit-member-save">Save</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
(function() {
  const $ = (sel, root) => (root || document).querySelector(sel);
  const $$ = (sel, root) => Array.from((root || document).querySelectorAll(sel));
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function shortId(id) { return (id || '').slice(0, 8); }
  function onlineDot(online) {
    return online
      ? '<span class="online" title="online">●</span>'
      : '<span class="offline" title="offline">○</span>';
  }

  // statusPillClass mirrors session/list.go's getStatusColorFunc so
  // the dashboard's pill colors match the terminal `session ls` output.
  function statusPillClass(status) {
    if (!status) return 'state-offline';
    if (status === 'working') return 'state-working';
    if (status === 'main_agent_idle') return 'state-working';
    if (status === 'idle') return 'state-idle';
    if (status === 'awaiting_permission' || status === 'awaiting_input') return 'state-awaiting';
    if (status === 'exited') return 'state-exited';
    return 'state-idle';
  }

  // statePill renders a colored pill for an agent's state. Combines
  // status + status_detail when present (e.g. "working: Bash"). For
  // offline (no status row) we render a literal "offline" pill so
  // every row has a consistent shape.
  function statePill(state, online) {
    const s = (state && state.status) || '';
    const detail = (state && state.status_detail) || '';
    let label = s || (online ? 'online' : 'offline');
    if (s && detail) label = `${s}: ${detail}`;
    const cls = online ? statusPillClass(s) : 'state-offline';
    return `<span class="state-pill ${cls}" title="${esc(label)}">${esc(label)}</span>`;
  }

  // groupTagsCell renders the Groups column on the Agents view. Each
  // group becomes a tag; groups the agent owns get an "owner" badge
  // appended to the tag so the manager-vs-member distinction is
  // visible at a glance.
  function groupTagsCell(a) {
    const groups = a.groups || [];
    if (!groups.length) return '<span class="muted">(none)</span>';
    const owned = new Set(a.owned_groups || []);
    return groups.map(g => {
      const ownBadge = owned.has(g) ? '<span class="owner-badge">owner</span>' : '';
      return `<span class="tag">${esc(g)}${ownBadge}</span>`;
    }).join(' ');
  }

  // roleCell renders the role column for a member row. Mirrors the CLI:
  // members who are also owners get an "owner" badge; pure-owners
  // (role==="owner" set by the daemon) show the badge alone.
  function roleCell(m) {
    if (m.owner) {
      if (!m.role || m.role === 'owner') {
        return '<span class="owner-badge">owner</span>';
      }
      return `${esc(m.role)} <span class="owner-badge">owner</span>`;
    }
    return esc(m.role || '');
  }

  // memberActions renders the per-row action button cell. Two
  // buttons per row:
  //   - Toggle owner: revoke if currently owner, grant if not
  //   - Remove from group (destructive)
  // Both encode the group + conv via data-* attributes; the
  // delegated click handler reads them and dispatches to the
  // confirm modal + the right /api endpoint.
  function memberActions(g, m) {
    const focusBtn = m.online
      ? `<button data-act="jump" data-conv="${esc(m.conv_id)}" data-label="${esc(m.alias || m.title || m.conv_id)}" title="Focus this agent's terminal window">focus</button>`
      : '';
    // Edit opens the alias/role/descr modal pre-filled with current
    // values. The handler reads data-* attributes back, so embed the
    // current values here (HTML-escaped). Owner state is mutated by
    // the make/revoke-owner buttons, NOT by the role text field.
    const editBtn = `<button data-act="edit-member" data-group="${esc(g.name)}" data-conv="${esc(m.conv_id)}" data-label="${esc(m.alias || m.title || m.conv_id)}" data-alias="${esc(m.alias || '')}" data-role="${esc(m.role || '')}" data-descr="${esc(m.descr || '')}" title="Edit alias / role / description">edit</button>`;
    const ownerBtn = m.owner
      ? `<button class="warn" data-act="revoke-owner" data-group="${esc(g.name)}" data-conv="${esc(m.conv_id)}" data-label="${esc(m.alias || m.title || m.conv_id)}" title="Revoke owner status">revoke owner</button>`
      : `<button data-act="grant-owner" data-group="${esc(g.name)}" data-conv="${esc(m.conv_id)}" data-label="${esc(m.alias || m.title || m.conv_id)}" title="Make this conv an owner of the group">make owner</button>`;
    const removeBtn = `<button class="danger" data-act="remove-member" data-group="${esc(g.name)}" data-conv="${esc(m.conv_id)}" data-label="${esc(m.alias || m.title || m.conv_id)}" title="Remove from group">remove</button>`;
    return `<div class="row-actions">${focusBtn}${editBtn}${ownerBtn}${removeBtn}</div>`;
  }

  // relTime renders an ISO timestamp as a coarse "Ns/m/h ago" string.
  // Mirrors the session ls UPDATED column. Empty input → "" (no chip).
  function relTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d)) return '';
    const sec = Math.max(0, Math.floor((Date.now() - d.getTime()) / 1000));
    if (sec < 60) return sec + 's ago';
    if (sec < 3600) return Math.floor(sec / 60) + 'm ago';
    if (sec < 86400) return Math.floor(sec / 3600) + 'h ago';
    return Math.floor(sec / 86400) + 'd ago';
  }

  function shortCwd(cwd) {
    if (!cwd) return '';
    const home = (cwd.match(/^\/(?:home|Users)\/[^/]+/) || [''])[0];
    if (home && cwd.startsWith(home)) return '~' + cwd.slice(home.length);
    return cwd;
  }

  function renderGroups(groups) {
    if (!groups || !groups.length) {
      return '<div class="empty">No groups yet. Create one with: <code>tclaude agent groups create &lt;name&gt;</code></div>';
    }
    return groups.map(g => {
      const members = g.members || [];
      // Restore expanded state across the 5s polling re-renders by
      // keying on group name. Persisted in localStorage so it
      // survives a full page reload too.
      const isOpen = localStorage.getItem('tclaude.dash.group.' + g.name) === '1';
      return `
      <details data-group-key="${esc(g.name)}"${isOpen ? ' open' : ''}>
        <summary>
          <strong class="group-name" data-group-name="${esc(g.name)}">${esc(g.name)}</strong>
          <span class="muted">— ${members.length} members, ${g.online || 0} online</span>
          ${g.descr ? `<span class="muted"> — ${esc(g.descr)}</span>` : ''}
          <span class="group-actions">
            <button data-act="rename-group" data-group="${esc(g.name)}" data-label="${esc(g.name)}" title="Rename this group">rename</button>
            <button class="danger" data-act="delete-group" data-group="${esc(g.name)}" data-label="${esc(g.name)}" data-members="${members.length}" title="Delete this group">delete group</button>
          </span>
        </summary>
        <div class="subtable">
          ${members.length === 0 ? '<div class="muted">(no members yet)</div>' : `
          <table>
            <thead>
              <tr>
                <th></th><th>ID</th><th>Alias / Title</th><th>State</th><th>Last</th><th>Role</th><th>Description</th><th></th>
              </tr>
            </thead>
            <tbody>
              ${members.map(m => {
                const state = m.state || {};
                const subagents = state.subagent_count || 0;
                return `
                <tr>
                  <td>${onlineDot(m.online)}</td>
                  <td class="id">${esc(shortId(m.conv_id))}</td>
                  <td>
                    <div class="alias">${esc(m.alias || m.title || '(unnamed)')}</div>
                    ${m.alias && m.title ? `<div class="title muted">${esc(m.title)}</div>` : ''}
                  </td>
                  <td>
                    ${statePill(state, m.online)}
                    ${subagents > 0 ? `<span class="state-detail">+${subagents}</span>` : ''}
                  </td>
                  <td><span class="last-hook">${esc(relTime(state.last_hook))}</span></td>
                  <td>${roleCell(m)}</td>
                  <td class="muted">${esc(m.descr || '')}</td>
                  <td>${memberActions(g, m)}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>`}
          <code class="copy-cmd" data-copy="tclaude agent groups members ${g.name}">tclaude agent groups members ${esc(g.name)}</code>
        </div>
      </details>
    `;
    }).join('');
  }

  function renderAgents(agents) {
    if (!agents || !agents.length) {
      return '<div class="empty">No agents in any group yet.</div>';
    }
    return `
      <table>
        <thead>
          <tr>
            <th></th><th>ID</th><th>Name</th><th>State</th><th>Last activity</th><th>CWD</th><th>Groups</th><th>Effective permissions</th><th></th>
          </tr>
        </thead>
        <tbody>
          ${agents.map(a => {
            const state = a.state || {};
            const lh = relTime(state.last_hook);
            const subagents = state.subagent_count || 0;
            return `
            <tr>
              <td>${onlineDot(a.online)}</td>
              <td class="id">${esc(shortId(a.conv_id))}</td>
              <td><span class="alias">${esc(a.title)}</span></td>
              <td>
                ${statePill(state, a.online)}
                ${subagents > 0 ? `<span class="state-detail">+${subagents} subagent${subagents > 1 ? 's' : ''}</span>` : ''}
              </td>
              <td><span class="last-hook">${esc(lh)}</span></td>
              <td><span class="cwd" title="${esc(state.cwd || '')}">${esc(shortCwd(state.cwd))}</span></td>
              <td>${groupTagsCell(a)}</td>
              <td>${(a.effective || []).map(s => `<span class="tag slug">${esc(s)}</span>`).join(' ') || '<span class="muted">(none)</span>'}</td>
              <td><div class="row-actions">${a.online ? `<button data-act="jump" data-conv="${esc(a.conv_id)}" data-label="${esc(a.title || a.conv_id)}" title="Focus this agent's terminal window">focus</button>` : ''}<button class="danger" data-act="delete-agent" data-conv="${esc(a.conv_id)}" data-label="${esc(a.title || a.conv_id)}" title="Permanently delete this conversation">delete</button></div></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    `;
  }

  function renderPermissions(perm, agents) {
    const titleByConv = Object.fromEntries((agents || []).map(a => [a.conv_id, a.title]));
    const grants = perm.grants || {};
    const defaults = perm.defaults || [];
    return `
      <h3 style="margin-top:0">Defaults <span class="muted" style="font-size:11px">— granted to every agent (config.json)</span></h3>
      ${defaults.length === 0
        ? '<div class="empty">No defaults set. Grant with: <code>tclaude agent permissions grant default &lt;slug&gt;</code></div>'
        : `<div>${defaults.map(s => `<span class="tag default slug">${esc(s)}</span>`).join(' ')}</div>`}
      <h3>Per-agent grants <span class="muted" style="font-size:11px">— additive on top of defaults (SQLite agent_permissions)</span></h3>
      ${Object.keys(grants).length === 0
        ? '<div class="empty">No per-agent grants yet. Grant with: <code>tclaude agent permissions grant &lt;conv&gt; &lt;slug&gt;</code></div>'
        : `<table>
            <thead><tr><th>ID</th><th>Title</th><th>Granted slugs</th></tr></thead>
            <tbody>
              ${Object.entries(grants).map(([k, slugs]) => `
                <tr>
                  <td class="id">${esc(shortId(k))}</td>
                  <td class="alias">${esc(titleByConv[k] || '(unknown)')}</td>
                  <td>${slugs.map(s => `<span class="tag slug">${esc(s)}</span>`).join(' ')}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>`}
    `;
  }

  function renderSlugs(slugs) {
    if (!slugs || !slugs.length) return '<div class="empty">No slugs registered.</div>';
    return `
      <table>
        <thead><tr><th>Slug</th><th>Description</th></tr></thead>
        <tbody>
          ${slugs.map(s => `
            <tr>
              <td><span class="slug">${esc(s.slug)}</span></td>
              <td>${esc(s.description || '')}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  function showStatus(text, isError) {
    const el = $('#status');
    el.textContent = text;
    el.classList.toggle('error', !!isError);
  }

  // Last successful snapshot, kept so the filter inputs can re-render
  // without a server roundtrip when the user types.
  let lastSnapshot = null;
  // True while an inline rename input is open; suspends the auto-
  // refresh so the 5s tick doesn't blow the input away mid-edit.
  let renameEditing = false;
  // True while the edit-member modal is open; same purpose as
  // renameEditing — refresh() short-circuits on either flag.
  let modalEditing = false;

  function filterGroups(groups, q) {
    if (!q) return groups;
    const needle = q.toLowerCase();
    const out = [];
    for (const g of groups) {
      const nameHit = (g.name || '').toLowerCase().includes(needle);
      const matchedMembers = (g.members || []).filter(m =>
        ((m.alias || '').toLowerCase().includes(needle)) ||
        ((m.title || '').toLowerCase().includes(needle)) ||
        ((m.conv_id || '').toLowerCase().includes(needle))
      );
      if (nameHit) {
        // Group name matched: keep all members so the user can see
        // the whole group context.
        out.push(g);
      } else if (matchedMembers.length > 0) {
        // Members matched: show only the matching subset.
        out.push({ ...g, members: matchedMembers });
      }
    }
    return out;
  }

  function filterAgents(agents, q) {
    if (!q) return agents;
    const needle = q.toLowerCase();
    return agents.filter(a =>
      ((a.title || '').toLowerCase().includes(needle)) ||
      ((a.conv_id || '').toLowerCase().includes(needle)) ||
      (a.groups || []).some(g => g.toLowerCase().includes(needle))
    );
  }

  function renderGroupsTab() {
    if (!lastSnapshot) return;
    const q = $('#filter-groups').value;
    const filtered = filterGroups(lastSnapshot.groups || [], q);
    $('#groups-list').innerHTML = renderGroups(filtered);
    const total = (lastSnapshot.groups || []).length;
    $('#filter-groups-count').textContent = q
      ? `${filtered.length} / ${total}` : `${total} group${total === 1 ? '' : 's'}`;
  }

  function renderAgentsTab() {
    if (!lastSnapshot) return;
    const q = $('#filter-agents').value;
    const filtered = filterAgents(lastSnapshot.agents || [], q);
    $('#agents-list').innerHTML = renderAgents(filtered);
    const total = (lastSnapshot.agents || []).length;
    $('#filter-agents-count').textContent = q
      ? `${filtered.length} / ${total}` : `${total} agent${total === 1 ? '' : 's'}`;
  }

  // formatInterval renders an integer second count as a coarse human
  // string ("30s", "5m", "2h", "1d"). Mirrors the cron CLI output so
  // dashboard + terminal read the same.
  function formatInterval(sec) {
    if (!sec) return '';
    if (sec < 60) return sec + 's';
    if (sec < 3600) return Math.floor(sec / 60) + 'm';
    if (sec < 86400) return Math.floor(sec / 3600) + 'h';
    return Math.floor(sec / 86400) + 'd';
  }

  // cronTargetCell describes where a cron job fires. Two shapes:
  //  - group:<name>  → the daemon enqueues an agent_messages row
  //                    visible to every member.
  //  - <conv-label>  → solo target; daemon does send-keys directly.
  function cronTargetCell(j) {
    if (j.group_id && j.group_name) {
      return `<span class="tag">group:${esc(j.group_name)}</span>`;
    }
    if (j.target_conv) {
      return `<span class="alias">${esc(j.target_label || j.target_conv.slice(0, 8))}</span>`;
    }
    return '<span class="muted">(no target)</span>';
  }

  // cronStatusPill colorises the last_run_status. Empty / "ok" /
  // anything else map to neutral / green / red respectively.
  function cronStatusPill(s) {
    if (!s) return '<span class="state-pill state-offline" title="never run">never run</span>';
    if (s === 'ok') return `<span class="state-pill state-working" title="${esc(s)}">${esc(s)}</span>`;
    return `<span class="state-pill state-awaiting" title="${esc(s)}">${esc(s)}</span>`;
  }

  function renderCron(jobs) {
    if (!jobs || !jobs.length) {
      return '<div class="empty">No cron jobs yet. Create one with: <code>tclaude agent cron add &lt;name&gt; &lt;interval&gt; &lt;target&gt; -- &lt;body&gt;</code></div>';
    }
    return `
      <table>
        <thead>
          <tr>
            <th></th><th>ID</th><th>Name</th><th>Owner</th><th>Target</th>
            <th>Every</th><th>Last run</th><th>Status</th><th>Body</th><th></th>
          </tr>
        </thead>
        <tbody>
          ${jobs.map(j => {
            const enabledDot = j.enabled
              ? '<span class="online" title="enabled">●</span>'
              : '<span class="offline" title="disabled">○</span>';
            const enableBtn = j.enabled
              ? `<button class="warn" data-act="cron-disable" data-id="${j.id}" data-label="${esc(j.name)}" title="Pause this cron job">disable</button>`
              : `<button data-act="cron-enable" data-id="${j.id}" data-label="${esc(j.name)}" title="Re-enable this cron job">enable</button>`;
            const runBtn = `<button data-act="cron-run-now" data-id="${j.id}" data-label="${esc(j.name)}" title="Fire this job immediately (also stamps last_run_at)">run now</button>`;
            const delBtn = `<button class="danger" data-act="cron-delete" data-id="${j.id}" data-label="${esc(j.name)}" title="Delete this cron job">delete</button>`;
            const bodySummary = (j.body || '').replace(/\s+/g, ' ').trim();
            const bodyTrunc = bodySummary.length > 80 ? bodySummary.slice(0, 80) + '…' : bodySummary;
            return `
              <tr>
                <td>${enabledDot}</td>
                <td class="id">${j.id}</td>
                <td><div class="alias">${esc(j.name)}</div>${j.subject ? `<div class="muted">${esc(j.subject)}</div>` : ''}</td>
                <td><span class="muted">${esc(j.owner_label || j.owner_conv.slice(0, 8))}</span></td>
                <td>${cronTargetCell(j)}</td>
                <td><span class="id">${esc(formatInterval(j.interval_seconds))}</span></td>
                <td><span class="last-hook">${esc(relTime(j.last_run_at) || '—')}</span></td>
                <td>${cronStatusPill(j.last_run_status)}</td>
                <td><span class="muted" title="${esc(j.body || '')}">${esc(bodyTrunc)}</span></td>
                <td><div class="row-actions">${runBtn}${enableBtn}${delBtn}</div></td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    `;
  }

  function filterCron(jobs, q) {
    if (!q) return jobs;
    const needle = q.toLowerCase();
    return jobs.filter(j =>
      ((j.name || '').toLowerCase().includes(needle)) ||
      ((j.owner_label || '').toLowerCase().includes(needle)) ||
      ((j.target_label || '').toLowerCase().includes(needle)) ||
      ((j.group_name || '').toLowerCase().includes(needle)) ||
      ((j.body || '').toLowerCase().includes(needle))
    );
  }

  function renderCronTab() {
    if (!lastSnapshot) return;
    const q = $('#filter-cron').value;
    const filtered = filterCron(lastSnapshot.cron || [], q);
    $('#cron-list').innerHTML = renderCron(filtered);
    const total = (lastSnapshot.cron || []).length;
    $('#filter-cron-count').textContent = q
      ? `${filtered.length} / ${total}` : `${total} job${total === 1 ? '' : 's'}`;
  }

  function bindFilter(tab) {
    const input = $(`#filter-${tab}`);
    const clear = $(`#filter-${tab}-clear`);
    const key = `tclaude.dash.filter.${tab}`;
    input.value = localStorage.getItem(key) || '';
    const onChange = () => {
      const v = input.value;
      if (v) localStorage.setItem(key, v); else localStorage.removeItem(key);
      if (tab === 'groups') renderGroupsTab();
      else if (tab === 'agents') renderAgentsTab();
      else if (tab === 'cron') renderCronTab();
    };
    input.addEventListener('input', onChange);
    clear.addEventListener('click', () => { input.value = ''; onChange(); input.focus(); });
  }

  async function refresh() {
    if (renameEditing || modalEditing) {
      // An inline-edit input or a modal is open; re-rendering would
      // either blow the input away mid-keystroke or refocus the
      // textarea. Skip this tick — commit() / cancel() handlers will
      // re-trigger refresh() when the user is done.
      return;
    }
    try {
      const r = await fetch('/api/snapshot', { credentials: 'same-origin' });
      if (!r.ok) {
        showStatus('snapshot failed: HTTP ' + r.status, true);
        return;
      }
      const data = await r.json();
      lastSnapshot = data;
      $('#meta').textContent = data.popup_base + ' · refreshed ' + new Date(data.generated_at).toLocaleTimeString();
      renderGroupsTab();
      renderAgentsTab();
      renderCronTab();
      $('#tab-permissions').innerHTML = renderPermissions(data.permissions, data.agents);
      $('#tab-slugs').innerHTML = renderSlugs(data.slugs);
      showStatus('● live', false);
    } catch (e) {
      showStatus('snapshot failed: ' + (e.message || e), true);
    }
  }

  function bindTabs() {
    $$('nav button').forEach(b => {
      b.addEventListener('click', () => {
        $$('nav button').forEach(x => x.classList.toggle('active', x === b));
        $$('main section').forEach(s => {
          s.classList.toggle('active', s.id === 'tab-' + b.dataset.tab);
        });
      });
    });
  }

  function bindCopy() {
    document.addEventListener('click', e => {
      const t = e.target.closest('[data-copy]');
      if (!t) return;
      const cmd = t.getAttribute('data-copy');
      navigator.clipboard?.writeText(cmd).then(() => {
        const orig = t.textContent;
        t.textContent = '✓ copied: ' + cmd;
        setTimeout(() => { t.textContent = orig; }, 1200);
      }).catch(() => {});
    });
  }

  // <details> only fires `toggle` on the element itself (not bubbling),
  // so use a capturing listener at the document level rather than
  // re-binding per-element after every render.
  function bindDetailsPersistence() {
    document.addEventListener('toggle', e => {
      const d = e.target;
      if (!(d instanceof HTMLDetailsElement)) return;
      const key = d.getAttribute('data-group-key');
      if (!key) return;
      if (d.open) {
        localStorage.setItem('tclaude.dash.group.' + key, '1');
      } else {
        localStorage.removeItem('tclaude.dash.group.' + key);
      }
    }, true);
  }

  // --- inline mutations: action buttons + confirm modal + toast ---

  // confirmModal pops the confirmation overlay; resolves true on
  // OK, false on Cancel / outside-click / Escape.
  function confirmModal({title, body, meta, okLabel}) {
    return new Promise(resolve => {
      const overlay = $('#confirm-modal');
      $('#confirm-title').textContent = title;
      $('#confirm-body').textContent = body;
      $('#confirm-meta').textContent = meta || '';
      $('#confirm-meta').style.display = meta ? 'block' : 'none';
      const okBtn = $('#confirm-ok');
      okBtn.textContent = okLabel || 'Confirm';
      const cancelBtn = $('#confirm-cancel');
      const cleanup = (result) => {
        overlay.classList.remove('show');
        okBtn.removeEventListener('click', onOk);
        cancelBtn.removeEventListener('click', onCancel);
        overlay.removeEventListener('click', onOverlay);
        document.removeEventListener('keydown', onKey);
        resolve(result);
      };
      const onOk = () => cleanup(true);
      const onCancel = () => cleanup(false);
      const onOverlay = (e) => { if (e.target === overlay) cleanup(false); };
      const onKey = (e) => { if (e.key === 'Escape') cleanup(false); };
      okBtn.addEventListener('click', onOk);
      cancelBtn.addEventListener('click', onCancel);
      overlay.addEventListener('click', onOverlay);
      document.addEventListener('keydown', onKey);
      overlay.classList.add('show');
      okBtn.focus();
    });
  }

  // editMemberModal pops the alias/role/descr editor pre-filled with
  // current values. Resolves to the new {alias, role, descr} object on
  // Save (only fields that actually changed are kept; unchanged fields
  // are sent as null so the daemon leaves them alone), or null on
  // Cancel / outside-click / Escape. Auto-refresh suspends while the
  // modal is open via the modalEditing flag.
  function editMemberModal({label, alias, role, descr}) {
    return new Promise(resolve => {
      const overlay = $('#edit-member-modal');
      $('#edit-member-meta').textContent = label || '';
      $('#edit-member-meta').style.display = label ? 'block' : 'none';
      const aliasEl = $('#edit-member-alias');
      const roleEl = $('#edit-member-role');
      const descrEl = $('#edit-member-descr');
      aliasEl.value = alias || '';
      roleEl.value = role || '';
      descrEl.value = descr || '';
      const saveBtn = $('#edit-member-save');
      const cancelBtn = $('#edit-member-cancel');
      modalEditing = true;
      const cleanup = (result) => {
        overlay.classList.remove('show');
        saveBtn.removeEventListener('click', onSave);
        cancelBtn.removeEventListener('click', onCancel);
        overlay.removeEventListener('click', onOverlay);
        document.removeEventListener('keydown', onKey);
        modalEditing = false;
        resolve(result);
      };
      const onSave = () => {
        // Only send fields that changed; unchanged fields go as null
        // so the daemon's PATCH leaves them untouched. Each field
        // either differs from the original (send the new value, even
        // if empty) or is unchanged (send null).
        const out = {};
        const newAlias = aliasEl.value;
        const newRole = roleEl.value;
        const newDescr = descrEl.value;
        if (newAlias !== (alias || '')) out.alias = newAlias;
        if (newRole !== (role || '')) out.role = newRole;
        if (newDescr !== (descr || '')) out.descr = newDescr;
        cleanup(Object.keys(out).length === 0 ? 'noop' : out);
      };
      const onCancel = () => cleanup(null);
      const onOverlay = (e) => { if (e.target === overlay) cleanup(null); };
      const onKey = (e) => {
        if (e.key === 'Escape') { e.preventDefault(); cleanup(null); }
        // Ctrl/Cmd+Enter saves from anywhere in the modal so power
        // users don't have to mouse over to the Save button.
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
          e.preventDefault(); onSave();
        }
      };
      saveBtn.addEventListener('click', onSave);
      cancelBtn.addEventListener('click', onCancel);
      overlay.addEventListener('click', onOverlay);
      document.addEventListener('keydown', onKey);
      overlay.classList.add('show');
      aliasEl.focus();
      aliasEl.select();
    });
  }

  // toast shows a transient message in the bottom-right. error=true
  // makes the left border red. Auto-dismisses after 3s.
  let toastTimer = null;
  function toast(message, error) {
    const el = $('#toast');
    el.textContent = message;
    el.classList.toggle('error', !!error);
    el.classList.add('show');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
  }

  // bindRowActions delegates clicks on row-action buttons to the
  // appropriate /api/groups/... call. After a successful mutation we
  // re-fetch the snapshot so the badge / button state updates.
  function bindRowActions() {
    document.addEventListener('click', async (e) => {
      const btn = e.target.closest('[data-act]');
      if (!btn) return;
      // Buttons may live inside <summary>, where the default click
      // action is to toggle the details. Stop that.
      e.preventDefault();
      const act = btn.getAttribute('data-act');
      const group = btn.getAttribute('data-group');
      const conv = btn.getAttribute('data-conv');
      const label = btn.getAttribute('data-label') || conv;
      try {
        let ok = false;
        switch (act) {
          case 'remove-member': {
            const confirmed = await confirmModal({
              title: 'Remove member from group?',
              body: 'This unsubscribes them from group messages and severs the manager-pattern path. Their conv keeps running.',
              meta: `${label} → ${group}`,
              okLabel: 'Remove',
            });
            if (!confirmed) return;
            const r = await fetch(`/api/groups/${encodeURIComponent(group)}/members/${encodeURIComponent(conv)}`, {
              method: 'DELETE', credentials: 'same-origin',
            });
            ok = r.ok;
            if (!ok) toast(`Remove failed: ${await r.text()}`, true);
            break;
          }
          case 'grant-owner': {
            // Granting owner is non-destructive; skip the confirm
            // modal but still re-fetch on success.
            const r = await fetch(`/api/groups/${encodeURIComponent(group)}/owners`, {
              method: 'POST', credentials: 'same-origin',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ conv }),
            });
            ok = r.ok;
            if (!ok) toast(`Grant owner failed: ${await r.text()}`, true);
            break;
          }
          case 'jump': {
            // Non-destructive; no confirm modal, just fire-and-toast.
            const r = await fetch(`/api/jump/${encodeURIComponent(conv)}`, {
              method: 'POST', credentials: 'same-origin',
            });
            ok = r.ok;
            if (!ok) toast(`Jump failed: ${await r.text()}`, true);
            // Skip the default refresh — focusing doesn't change any
            // dashboard state and the user just left the window.
            if (ok) toast(`focused: ${label}`);
            return;
          }
          case 'delete-agent': {
            const confirmed = await confirmModal({
              title: 'Permanently delete this agent?',
              body: `Wipes the .jsonl conversation file from disk, drops the conv_index DB row, removes the entry from sessions-index.json, writes a sync tombstone if sync is enabled, AND drops every group membership / ownership / per-agent permission row referencing this conv-id (so the agent disappears from the listing instead of leaving a "(unknown)" ghost).`,
              meta: label,
              okLabel: 'Delete forever',
            });
            if (!confirmed) return;
            const r = await fetch(`/api/agents/${encodeURIComponent(conv)}`, {
              method: 'DELETE', credentials: 'same-origin',
            });
            ok = r.ok;
            if (!ok) toast(`Delete failed: ${await r.text()}`, true);
            break;
          }
          case 'edit-member': {
            const cur = {
              alias: btn.getAttribute('data-alias') || '',
              role: btn.getAttribute('data-role') || '',
              descr: btn.getAttribute('data-descr') || '',
            };
            const result = await editMemberModal({
              label: `${label} → ${group}`,
              alias: cur.alias, role: cur.role, descr: cur.descr,
            });
            if (result === null) return; // cancelled
            if (result === 'noop') {
              toast('no changes');
              return;
            }
            const r = await fetch(`/api/groups/${encodeURIComponent(group)}/members/${encodeURIComponent(conv)}`, {
              method: 'PATCH', credentials: 'same-origin',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(result),
            });
            ok = r.ok;
            if (!ok) toast(`edit failed: ${await r.text()}`, true);
            break;
          }
          case 'rename-group': {
            // Inline edit: replace the group's <strong> label with an
            // <input>. Enter saves (POST /api/groups/{old}/rename),
            // Esc cancels (revert without touching the daemon).
            // Background poll is suspended while editing so a 5s
            // refresh doesn't blow the input away mid-type.
            const summary = btn.closest('summary');
            const nameEl = summary && summary.querySelector('.group-name');
            if (!nameEl) {
              toast('rename: could not locate group name element', true);
              return;
            }
            // Suspend the auto-refresh while the input is open. The
            // refresh re-runs renderGroups which would replace our
            // input back with the static strong, losing keystrokes.
            const prevSnapshot = lastSnapshot;
            renameEditing = true;
            const oldName = group;
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'group-rename-input';
            input.value = oldName;
            input.spellcheck = false;
            input.autocomplete = 'off';
            // Replace + focus + select.
            nameEl.replaceWith(input);
            input.focus();
            input.select();
            const restore = () => {
              const restored = document.createElement('strong');
              restored.className = 'group-name';
              restored.dataset.groupName = oldName;
              restored.textContent = oldName;
              if (input.parentNode) input.replaceWith(restored);
              renameEditing = false;
              lastSnapshot = prevSnapshot;
            };
            const commit = async () => {
              const newName = input.value;
              if (newName === oldName || newName.trim() === '') {
                restore();
                return;
              }
              const r = await fetch(`/api/groups/${encodeURIComponent(oldName)}/rename`, {
                method: 'POST', credentials: 'same-origin',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ new_name: newName }),
              });
              if (!r.ok) {
                toast(`rename failed: ${await r.text()}`, true);
                restore();
                return;
              }
              // Move the persisted "is open" flag onto the new key so
              // the details stays in the state the user left it in.
              const wasOpen = localStorage.getItem('tclaude.dash.group.' + oldName) === '1';
              localStorage.removeItem('tclaude.dash.group.' + oldName);
              if (wasOpen) localStorage.setItem('tclaude.dash.group.' + newName, '1');
              renameEditing = false;
              toast(`renamed: ${oldName} → ${newName}`);
              refresh();
            };
            input.addEventListener('keydown', (ev) => {
              if (ev.key === 'Enter') { ev.preventDefault(); commit(); }
              else if (ev.key === 'Escape') { ev.preventDefault(); restore(); }
            });
            input.addEventListener('blur', () => {
              // Blur cancels rather than commits — avoids accidentally
              // posting a stale name when the user clicks elsewhere
              // mid-edit. They have to commit explicitly with Enter.
              if (renameEditing) restore();
            });
            return; // Skip the default refresh; commit() / restore() handle it.
          }
          case 'delete-group': {
            const memberCount = parseInt(btn.getAttribute('data-members') || '0', 10);
            const confirmed = await confirmModal({
              title: 'Delete group?',
              body: `This drops the group plus all ${memberCount} membership row(s), any owner grants, and the entire group message history. The conversations themselves keep running.`,
              meta: group,
              okLabel: 'Delete group',
            });
            if (!confirmed) return;
            const r = await fetch(`/api/groups/${encodeURIComponent(group)}`, {
              method: 'DELETE', credentials: 'same-origin',
            });
            ok = r.ok;
            if (!ok) toast(`Delete failed: ${await r.text()}`, true);
            break;
          }
          case 'revoke-owner': {
            const confirmed = await confirmModal({
              title: 'Revoke owner status?',
              body: 'They will lose the implicit power to manage other members of this group (message, reincarnate, compact, rename, clone). The membership row stays.',
              meta: `${label} → ${group}`,
              okLabel: 'Revoke',
            });
            if (!confirmed) return;
            const r = await fetch(`/api/groups/${encodeURIComponent(group)}/owners/${encodeURIComponent(conv)}`, {
              method: 'DELETE', credentials: 'same-origin',
            });
            ok = r.ok;
            if (!ok) toast(`Revoke failed: ${await r.text()}`, true);
            break;
          }
          case 'cron-enable':
          case 'cron-disable': {
            const id = btn.getAttribute('data-id');
            const verb = act === 'cron-enable' ? 'enable' : 'disable';
            const r = await fetch(`/api/cron/${encodeURIComponent(id)}/${verb}`, {
              method: 'POST', credentials: 'same-origin',
            });
            ok = r.ok;
            if (!ok) toast(`${verb} failed: ${await r.text()}`, true);
            break;
          }
          case 'cron-run-now': {
            const id = btn.getAttribute('data-id');
            // Run-now is non-destructive (it just fires the job once)
            // but it does send a real message to the target — confirm
            // so a stray click doesn't paste into someone's pane.
            const confirmed = await confirmModal({
              title: 'Fire this cron job now?',
              body: 'Sends the job\'s message to its target immediately. Stamps last_run_at so the regular cadence resumes from now.',
              meta: label,
              okLabel: 'Fire now',
            });
            if (!confirmed) return;
            const r = await fetch(`/api/cron/${encodeURIComponent(id)}/run-now`, {
              method: 'POST', credentials: 'same-origin',
            });
            ok = r.ok;
            if (!ok) toast(`run-now failed: ${await r.text()}`, true);
            break;
          }
          case 'cron-delete': {
            const id = btn.getAttribute('data-id');
            const confirmed = await confirmModal({
              title: 'Delete cron job?',
              body: 'Removes the job and its run history. The target itself is unaffected; you can re-create the job with `tclaude agent cron add`.',
              meta: label,
              okLabel: 'Delete job',
            });
            if (!confirmed) return;
            const r = await fetch(`/api/cron/${encodeURIComponent(id)}`, {
              method: 'DELETE', credentials: 'same-origin',
            });
            ok = r.ok;
            if (!ok) toast(`delete failed: ${await r.text()}`, true);
            break;
          }
          default:
            return;
        }
        if (ok) {
          toast(`${act.replace('-', ' ')}: ${label}`);
          refresh();
        }
      } catch (err) {
        toast(`Request failed: ${err && err.message || err}`, true);
      }
    });
  }

  bindTabs();
  bindCopy();
  bindDetailsPersistence();
  bindRowActions();
  bindFilter('groups');
  bindFilter('agents');
  bindFilter('cron');
  refresh();
  setInterval(refresh, 5000);
})();
</script>
</body>
</html>
