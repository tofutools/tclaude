<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>tclaude terminals</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text x="50" y="52" font-size="70" text-anchor="middle" dominant-baseline="central">🖥️</text></svg>'>
<link rel="stylesheet" href="/static/vendor/xterm/xterm.min.css">
<!-- The detached page reuses the dashboard's operator-message dialog as well
     as its terminal shell. dashboard.css supplies that shared dialog chrome;
     mux.css and terminals.css follow it with terminal/full-page overrides. -->
<link rel="stylesheet" href="/static/dashboard.css">
<link rel="stylesheet" href="/static/mux.css">
<link rel="stylesheet" href="/static/terminals.css">
</head>
<body class="solo">
<!-- Preact owns this stable standalone shell root. The xterm subtree remains
     opaque beneath its pane host and is created only by terminals-core.js. -->
<div id="terminals-root"></div>
<div id="message-access-dialog-root"></div>
<!-- Vendored xterm.js as classic (non-module) scripts so Terminal / FitAddon / WebLinksAddon
     are plain globals by the time the module below runs — same arrangement as
     dashboard.html. -->
<script src="/static/js/auth-session.js"></script>
<script src="/static/vendor/xterm/xterm.min.js"></script>
<script src="/static/vendor/xterm/addon-fit.min.js"></script>
<script src="/static/vendor/xterm/addon-web-links.min.js"></script>
<!-- Browser-native package resolution for the no-build Preact terminal shell.
     Every target is embedded and served from this authenticated origin. -->
<script type="importmap">
{
  "imports": {
    "preact": "/static/vendor/preact/preact.module.js",
    "preact/hooks": "/static/vendor/preact/hooks.module.js",
    "@preact/signals-core": "/static/vendor/preact/signals-core.module.js",
    "@preact/signals": "/static/vendor/preact/signals.module.js",
    "htm": "/static/vendor/preact/htm.module.js"
  }
}
</script>
<script type="module" src="/static/js/terminals.js"></script>
</body>
</html>
