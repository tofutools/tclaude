<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>tclaude terminals</title>
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text x="50" y="52" font-size="70" text-anchor="middle" dominant-baseline="central">🖥️</text></svg>'>
<link rel="stylesheet" href="/static/vendor/xterm/xterm.min.css">
<link rel="stylesheet" href="/static/terminals.css">
</head>
<body>
<!-- The standalone terminals multiplexer: a separate browser tab/window that
     holds many live xterm.js terminals at once, each streamed over a
     WebSocket to a real PTY on the agentd host (the same /api/term-ws and
     /api/open-window-ws endpoints the in-dashboard modal uses). Opened/seeded
     from the dashboard's "web term" / "web window" actions. See
     js/terminals.js. -->
<div id="mux">
  <div id="mux-tabs" role="tablist" aria-label="Open terminals"></div>
  <div id="mux-panes"></div>
  <div id="mux-empty">
    <div class="mux-empty-title">No terminals open</div>
    <div>Open one from the dashboard with the <code>web term</code> or <code>web window</code> buttons.</div>
    <div>They'll appear here as tabs — each can be popped out into its own browser tab.</div>
  </div>
</div>
<!-- Vendored xterm.js as classic (non-module) scripts so Terminal / FitAddon
     are plain globals by the time the module below runs — same arrangement as
     dashboard.html. -->
<script src="/static/vendor/xterm/xterm.min.js"></script>
<script src="/static/vendor/xterm/addon-fit.min.js"></script>
<script type="module" src="/static/js/terminals.js"></script>
</body>
</html>
