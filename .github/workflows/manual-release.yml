name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version increment type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

# Share the "release" concurrency group with release.yml so manual and automated
# releases serialize against each other (the group string is repo-global, not
# per-workflow). The next version number is computed early and read-only, but the
# tag isn't pushed until the release job — serializing whole runs prevents two
# in-flight releases from computing, then racing to push, the same tag.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # golangci-lint is platform-independent, so run it once on a single runner
  # rather than across the test matrix. lint, test, version, and build all run
  # in parallel; the release job gates on lint (plus test + build), so a manual
  # release still requires lint to pass.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, windows-11-arm, macos-latest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*

      # Cap package-level parallelism at 2 (-p 2) to match ci.yml; see the rationale there.
      - name: Run tests
        run: |
          export TCLAUDE_NODE_TEST_CACHE_KEY="$(node -p 'process.execPath + ":" + process.version')"
          go test -p 2 ./...

  # Version generation only computes the next number (read-only); it runs in
  # parallel with test/lint/build. The git tag is pushed later, by the release
  # job, so a tag is only created once test + lint + build have all passed.
  version:
    name: Generate Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate version
        id: version
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")

          # Split the version
          IFS='.' read -r major minor patch <<< "${LATEST_TAG/v/}"

          # Calculate new version based on input
          if [[ "${{ github.event.inputs.version_type }}" == "major" ]]; then
            NEW_VERSION="v$((major+1)).0.0"
          elif [[ "${{ github.event.inputs.version_type }}" == "minor" ]]; then
            NEW_VERSION="v$major.$((minor+1)).0"
          else
            NEW_VERSION="v$major.$minor.$((patch+1))"
          fi

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Creating new version: $NEW_VERSION"

  # Builds run in parallel with test/lint/version. goreleaser builds with
  # --snapshot (version_template "{{ .Tag }}-next", derived from the latest
  # existing tag), so the build never depends on the new version or its tag.
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
          - os: windows-11-arm
            goos: windows
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build with GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: build --single-target --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  # Publishing gate: only runs once test, lint, version, and build have all
  # succeeded. This is where the side effects happen — pushing the release tag
  # and creating the GitHub release — so neither can occur before everything
  # (tests included) is green.
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test, lint, version, build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Push Tag
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git tag -a ${{ needs.version.outputs.new_version }} -m "Release ${{ needs.version.outputs.new_version }}"
          git push origin ${{ needs.version.outputs.new_version }}

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create archives
        run: |
          cd dist
          for dir in */; do
            name="${dir%/}"
            # if [[ "$name" == *"windows"* ]]; then
            #   zip -r "${name}.zip" "$dir"
            # else
            tar -czvf "${name}.tar.gz" "$dir"
            # fi
          done
          # sha256sum *.tar.gz *.zip > checksums.txt
          sha256sum *.tar.gz > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.new_version }}
          files: |
            dist/*.tar.gz
            # dist/*.zip
            dist/checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
