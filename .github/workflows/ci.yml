name: CI

on:
  pull_request:
    # main-codex is the long-lived harness-independence integration branch; gate
    # its increment PRs with the same CI as main. Drop it once main-codex→main lands.
    branches: [main, main-codex]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # golangci-lint is platform-independent, so run it once on a single runner
  # rather than duplicating it across the test matrix.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest] # ubuntu-24.04-arm, windows-latest, windows-11-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # The dashboard's pure JS (command-palette ranking) is unit-tested with
      # Node's built-in test runner, invoked from a Go wrapper
      # (pkg/claude/agentd/palette_score_node_test.go) so it runs under the
      # same `go test ./...` below. Pin node here so that wrapper actually
      # runs in CI rather than silently skipping — see its CI guard.
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      # Cap package-level parallelism at 2 (-p 2). The default is GOMAXPROCS, which
      # runs every package's test binary at once: the flow tests contend on shared
      # resources (tmux sim, SQLite) and the interleaved output is hard to read on a
      # failure. Two-at-a-time keeps output legible without serializing the whole run.
      # (No tests use t.Parallel(), so -parallel is irrelevant here.)
      - name: Run tests
        run: go test -p 2 ./...
