name: CI

on:
  pull_request:
    # main-codex is the long-lived harness-independence integration branch; gate
    # its increment PRs with the same CI as main. Drop it once main-codex→main lands.
    # implement-stable-agent-identity is the long-lived JOH-26 integration branch
    # (stable agent_id, decoupled from conv_id) — same deal; drop it once it→main lands.
    # dnd-palette is the long-lived drag-and-drop-palette integration branch
    # (JOH-374..377) — same deal; drop it once dnd-palette→main lands.
    # perf-followups is the long-lived dashboard-polling-performance integration
    # branch (TCL-372/378/380/381) — same deal; drop it once perf-followups→main lands.
    branches: [main, main-codex, implement-stable-agent-identity, dnd-palette, perf-followups]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # golangci-lint is platform-independent, so run it once on a single runner
  # rather than duplicating it across the test matrix.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest] # ubuntu-24.04-arm, windows-latest, windows-11-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # The dashboard's pure JS (command-palette ranking) is unit-tested with
      # Node's built-in test runner, invoked from a Go wrapper
      # (pkg/claude/agentd/palette_score_node_test.go) so it runs under the
      # same `go test ./...` below. Pin node here so that wrapper actually
      # runs in CI rather than silently skipping — see its CI guard.
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*

      # Cap package-level parallelism at 2 (-p 2). The default is GOMAXPROCS, which
      # runs every package's test binary at once: the flow tests contend on shared
      # resources (tmux sim, SQLite) and the interleaved output is hard to read on a
      # failure. Two-at-a-time keeps output legible without serializing the whole run.
      # (No tests use t.Parallel(), so -parallel is irrelevant here.)
      #
      # The Go race detector is OFF by default and gated behind the RUN_RACE
      # repository variable (Settings -> Secrets and variables -> Actions ->
      # Variables -> RUN_RACE=true) so it can be enabled later without a code
      # change. It roughly triples the test step's wall-clock, which is why it
      # is opt-in. The suite is race-clean as of this writing, so flipping the
      # variable is safe. -race needs CGO, which the ubuntu/macOS runners have
      # on by default (this matrix is ubuntu+macOS only — the detector does not
      # support windows/arm64, so do not add -race to a matrix that includes it).
      - name: Run tests
        run: go test ${{ vars.RUN_RACE == 'true' && '-race' || '' }} -p 2 ./...
