name: CI

on:
  pull_request:
    # main-codex is the long-lived harness-independence integration branch; gate
    # its increment PRs with the same CI as main. Drop it once main-codex→main lands.
    # implement-stable-agent-identity is the long-lived JOH-26 integration branch
    # (stable agent_id, decoupled from conv_id) — same deal; drop it once it→main lands.
    # dnd-palette is the long-lived drag-and-drop-palette integration branch
    # (JOH-374..377) — same deal; drop it once dnd-palette→main lands.
    branches: [main, main-codex, implement-stable-agent-identity, dnd-palette]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # golangci-lint is platform-independent, so run it once on a single runner
  # rather than duplicating it across the test matrix.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      # One red shard must not cancel its siblings — the point of sharding is
      # seeing exactly which slice fails.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # The suite is sharded across concurrent runners so the wall clock is
        # bounded by the slowest single package instead of the sum. The three
        # named shards are the measured heavyweights (agentd ~2.5min serial,
        # jstest's 124 Node suites, the process tree's CPU-bound packages);
        # `rest` is everything else via an exclusion filter in the run step.
        # That filter must stay in sync with this list: each named shard's
        # target is excluded by an anchored pattern, so a package can be
        # dropped from CI only if a named shard's path stops existing — which
        # fails that shard loudly ("no such package") rather than silently.
        shard: [agentd, jstest, process, rest]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # The dashboard's JS is unit-tested with Node's built-in test runner,
      # invoked from pkg/claude/agentd/jstest/dashboard_node_test.go so it runs
      # under the same `go test ./...` below. Pin node here so that wrapper
      # actually runs in CI rather than silently skipping — see its CI guard.
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*

      # Package-level parallelism is left at the default (GOMAXPROCS). An earlier
      # -p 2 cap existed for output legibility and contention worries, but go test
      # buffers each package's output and prints it atomically when testing
      # multiple packages, and every test runs against its own tempdir HOME, so
      # neither concern holds; the cap only stretched the wall clock. (-parallel
      # is left at its default too; the few packages using t.Parallel() are fine
      # with it.)
      #
      # The Go race detector is OFF by default and gated behind the RUN_RACE
      # repository variable (Settings -> Secrets and variables -> Actions ->
      # Variables -> RUN_RACE=true) so it can be enabled later without a code
      # change. It roughly triples the test step's wall-clock, which is why it
      # is opt-in. The suite is race-clean as of this writing, so flipping the
      # variable is safe. -race needs CGO, which the ubuntu/macOS runners have
      # on by default.
      # Make the external Node runtime part of jstest's Go test-cache key without
      # disabling useful result caching for every other package.
      - name: Run tests (${{ matrix.shard }})
        # Explicit bash so pipefail covers the `go list | ...` pipeline in the
        # rest shard (the implicit default is `bash -e` without pipefail).
        shell: bash
        run: |
          export TCLAUDE_NODE_TEST_CACHE_KEY="$(node -p 'process.execPath + ":" + process.version')"
          case "${{ matrix.shard }}" in
            agentd)  pkgs="./pkg/claude/agentd" ;;
            jstest)
              pkgs="./pkg/claude/agentd/jstest"
              # This shard owns its runner, so let Node use every core; the
              # in-test default (NumCPU-2, sized for sharing a runner with the
              # Go packages) would leave the 3-core macOS runner near-serial.
              # Assign before export: `export VAR=$(cmd)` discards cmd's exit
              # status, and a silently empty value would fall back to the
              # near-serial default — the regression this variable prevents.
              cores="$(getconf _NPROCESSORS_ONLN)"
              export TCLAUDE_JS_TEST_CONCURRENCY="$cores"
              ;;
            process) pkgs="./pkg/claude/process/..." ;;
            rest)
              # Everything the named shards don't cover, derived by literally
              # subtracting the named shards' `go list` output from the full
              # package list — the partition cannot drift from the shard
              # definitions above, and a removed/renamed shard target fails
              # here loudly instead of silently dropping packages.
              pkgs="$(comm -23 \
                <(go list ./... | sort) \
                <(go list ./pkg/claude/agentd ./pkg/claude/agentd/jstest ./pkg/claude/process/... | sort))"
              ;;
            *) echo "unknown shard: ${{ matrix.shard }}" >&2; exit 1 ;;
          esac
          go test ${{ vars.RUN_RACE == 'true' && '-race' || '' }} $pkgs
