name: CI

on:
  pull_request:
    # main-codex is the long-lived harness-independence integration branch; gate
    # its increment PRs with the same CI as main. Drop it once main-codex→main lands.
    # implement-stable-agent-identity is the long-lived JOH-26 integration branch
    # (stable agent_id, decoupled from conv_id) — same deal; drop it once it→main lands.
    # dnd-palette is the long-lived drag-and-drop-palette integration branch
    # (JOH-374..377) — same deal; drop it once dnd-palette→main lands.
    branches: [main, main-codex, implement-stable-agent-identity, dnd-palette]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # golangci-lint is platform-independent, so run it once on a single runner
  # rather than duplicating it across the test matrix.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      # One red shard must not cancel its siblings — the point of sharding is
      # seeing exactly which slice fails.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # The suite is sharded across concurrent runners so the wall clock is
        # bounded by the slowest single package instead of the sum. The shard
        # partition itself (and the rationale for each slice) lives in the
        # shared .github/actions/test-suite action, which the release
        # workflows consume with the same split — keep the shard list here in
        # sync with the case statement there.
        shard: [agentd, jstest, process, rest]
        exclude:
          # PR CI skips macOS jstest: the shard exercises browser-targeted
          # dashboard JS under Node + the vendored LinkeDOM runtime, so
          # nothing in it varies by runner OS (end-user browsers are a
          # different axis entirely) and one Linux run is full PR coverage.
          # macOS still covers this shard post-merge: release.yml's gating
          # Test job runs the same shard matrix without this exclusion.
          # Residual PR-side gap, accepted knowingly: the Go wrapper in
          # pkg/claude/agentd/jstest itself never builds/runs on darwin
          # before merge, so a darwin-only break there would surface in
          # release.yml (blocking releases) rather than bouncing the
          # offending PR. The Go shards run on both OSes — they carry
          # _unix/_darwin build-tagged code and real fs behavior.
          - os: macos-latest
            shard: jstest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # The Go race detector is OFF by default and gated behind the RUN_RACE
      # repository variable (Settings -> Secrets and variables -> Actions ->
      # Variables -> RUN_RACE=true) so it can be enabled later without a code
      # change. It roughly triples the test step's wall-clock, which is why it
      # is opt-in. The suite is race-clean as of this writing, so flipping the
      # variable is safe. -race needs CGO, which the ubuntu/macOS runners have
      # on by default.
      - name: Test suite (${{ matrix.shard }})
        uses: ./.github/actions/test-suite
        with:
          shard: ${{ matrix.shard }}
          race: ${{ vars.RUN_RACE }}
