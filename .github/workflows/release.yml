name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:
    inputs:
      homebrew_only:
        description: "Only sync the Homebrew tap to the latest release (skip test/build/release)"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  test:
    name: Test
    if: ${{ inputs.homebrew_only != true }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest] # ubuntu-24.04-arm, windows-latest, windows-11-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  version:
    name: Generate Version
    if: ${{ inputs.homebrew_only != true }}
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate version
        id: version
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")

          # Calculate new version - increment patch version
          IFS='.' read -r major minor patch <<< "${LATEST_TAG/v/}"
          NEW_VERSION="v$major.$minor.$((patch+1))"

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Creating new version: $NEW_VERSION"

      - name: Push Tag
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git tag -a ${{ steps.version.outputs.new_version }} -m "Release ${{ steps.version.outputs.new_version }}"
          git push origin ${{ steps.version.outputs.new_version }}

  build:
    name: Build (${{ matrix.os }})
    if: ${{ inputs.homebrew_only != true }}
    runs-on: ${{ matrix.os }}
    needs: version
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          #- os: windows-latest
          #  goos: windows
          #  goarch: amd64
          #- os: windows-11-arm
          #  goos: windows
          #  goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build with GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: build --single-target --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    name: Release
    if: ${{ inputs.homebrew_only != true }}
    runs-on: ubuntu-latest
    needs: [version, build]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create archives
        run: |
          cd dist
          for dir in */; do
            name="${dir%/}"
            # if [[ "$name" == *"windows"* ]]; then
            #   zip -r "${name}.zip" "$dir"
            # else
            tar -czvf "${name}.tar.gz" "$dir"
            # fi
          done
          # sha256sum *.tar.gz *.zip > checksums.txt
          sha256sum *.tar.gz > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.new_version }}
          files: |
            dist/*.tar.gz
            # dist/*.zip
            dist/checksums.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Keep the Homebrew tap (tofutools/homebrew-tap) in sync with each release.
  # The formula builds from source, so all we bump is the source-tarball URL
  # and its sha256. Requires a HOMEBREW_TAP_TOKEN secret (a PAT / fine-grained
  # token with Contents:write on tofutools/homebrew-tap); on the release path,
  # a missing token no-ops so releases are never blocked on the tap.
  #
  # Run it on its own — without cutting a release — via the Actions "Run
  # workflow" button with the "homebrew_only" box ticked (or:
  #   gh workflow run release.yml -f homebrew_only=true
  # ). In that mode it syncs the formula to the LATEST published release and a
  # missing token is a hard error (you asked for it explicitly).
  homebrew:
    name: Update Homebrew tap
    # Runs after a normal release, OR standalone when homebrew_only is set
    # (in which case test/version/build/release are skipped, so this gates on
    # !cancelled() rather than success of those jobs).
    if: ${{ !cancelled() && (inputs.homebrew_only == true || (needs.version.result == 'success' && needs.release.result == 'success')) }}
    runs-on: ubuntu-latest
    needs: [version, release]
    permissions:
      contents: read
    steps:
      - name: Check for tap token
        id: guard
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_ONLY: ${{ inputs.homebrew_only }}
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            if [ "${HOMEBREW_ONLY}" = "true" ]; then
              echo "::error::HOMEBREW_TAP_TOKEN is not set (or empty)."
              exit 1
            fi
            echo "HOMEBREW_TAP_TOKEN not set - skipping Homebrew tap update."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout tap
        if: steps.guard.outputs.enabled == 'true'
        uses: actions/checkout@v6
        with:
          repository: tofutools/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        id: formula
        if: steps.guard.outputs.enabled == 'true'
        env:
          # Empty on the homebrew_only path (the version job is skipped); we
          # then resolve the latest published release tag instead.
          VERSION: ${{ needs.version.outputs.new_version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${VERSION}"
          if [ -z "${version}" ]; then
            version="$(gh release view --repo "${GITHUB_REPOSITORY}" --json tagName --jq .tagName)"
            echo "Resolved latest release: ${version}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          url="https://github.com/tofutools/tclaude/archive/refs/tags/${version}.tar.gz"
          # GitHub's auto-generated source tarball can lag the tag by a few
          # seconds, so retry until it's downloadable.
          ok=false
          for i in $(seq 1 12); do
            if curl -fsSL --remove-on-error "$url" -o src.tgz; then ok=true; break; fi
            echo "source tarball not ready yet (attempt $i), retrying..."
            sleep 5
          done
          if [ "$ok" != true ]; then
            echo "source tarball never became available: $url" >&2
            exit 1
          fi
          sha="$(sha256sum src.tgz | cut -d' ' -f1)"
          rm -f src.tgz
          sed -i \
            -e "s|^  url \".*\"|  url \"${url}\"|" \
            -e "s|^  sha256 \".*\"|  sha256 \"${sha}\"|" \
            tap/Formula/tclaude.rb
          echo "Updated formula:"
          grep -E '^[[:space:]]+(url|sha256)' tap/Formula/tclaude.rb

      - name: Commit and push
        if: steps.guard.outputs.enabled == 'true'
        working-directory: tap
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Formula already up to date."
            exit 0
          fi
          git add Formula/tclaude.rb
          git commit -m "tclaude ${{ steps.formula.outputs.version }}"
          git push
