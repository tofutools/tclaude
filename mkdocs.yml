site_name: tclaude
site_url: https://tofutools.github.io/tclaude/
site_description: Session, conversation, and multi-agent tooling for Claude Code and OpenAI Codex CLI
repo_url: https://github.com/tofutools/tclaude
repo_name: tofutools/tclaude

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - content.code.copy
    - search.highlight

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Core Use:
      - Harnesses: harnesses.md
      - Sessions: sessions.md
      - Conversations: conversations.md
      - Ask from the Shell: ask.md
      - Git Worktrees: worktrees.md
      - Semantic Search: semantic-search.md
      - Notifications: notifications.md
  - Agent Operations:
      - Coordination: agent.md
      - Dashboard: dashboard.md
      - Remote Control: remote-control.md
      - Remote Dashboard Access: remote-access.md
      - Sandbox Hardening: sandbox-hardening.md
      - Processes: processes.md
  - Claude Code Utilities:
      - Task Runner: tasks.md
      - Status Bar: status-bar.md
  - Contributors:
      - Adding a Harness: adding-a-harness.md
