site_name: tclaude
site_url: https://tofutools.github.io/tclaude/
site_description: Claude Code CLI extensions and utilities
repo_url: https://github.com/tofutools/tclaude
repo_name: tofutools/tclaude

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - content.code.copy
    - search.highlight

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Session Management: sessions.md
  - Conversation Management: conversations.md
  - Git Worktrees: worktrees.md
  - Notifications: notifications.md
  - Web Terminal: web-terminal.md
  - Status Bar: status-bar.md
  - Git Sync: git-sync.md
